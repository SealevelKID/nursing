name: Nursing Data Auto Update

on:
  # 觸發條件 1：當你手動上傳或更新 Excel 檔案時，自動觸發清洗
  push:
    paths:
      - '*.xls'
      - '*.xlsx'
  # 觸發條件 2：每年年中與年末的排程 (中午 12:00 TW -> 04:00 UTC)
  schedule:
    - cron: '0 4 1 7 *'   # 每年 7月1日 觸發
    - cron: '0 4 31 12 *' # 每年 12月31日 觸發
  # 觸發條件 3：允許在 GitHub 網頁上手動點擊執行
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  TZ: Asia/Taipei
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 檢出儲存庫代碼
        uses: actions/checkout@v5

      - name: 設定 Python 環境
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: 安裝相依套件 (Pandas 與 Openpyxl)
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: 執行資料清洗與 JSON 生成
        run: |
          python process.py

      - name: 自動提交更新資料
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data.json
          if git diff --staged --quiet; then
            echo "資料無變更，跳過 Commit"
          else
            git commit -m "🏥 自動更新長照機構資料: $(date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: 部署至 GitHub Pages (自動更新網頁)
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

      - name: 發布部署
        uses: actions/deploy-pages@v5

      - name: 發送 Telegram 成功通知
        if: success()
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ env.TELEGRAM_CHAT_ID }} \
          -d text="✅ 【長照機構查詢網】資料已自動清洗完畢並部署上線！"

      - name: 發送 Telegram 失敗通知
        if: failure()
        run: |
          ERROR_LOG_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST https://api.telegram.org/bot${{ env.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ env.TELEGRAM_CHAT_ID }} \
          -d text="🚨 警告：【長照機構查詢網】資料更新失敗！%0A%0A請檢查 Excel 格式是否發生變動。%0A👉 點此查看報錯紀錄：%0A$ERROR_LOG_URL"